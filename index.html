<style>
:root {
  --bg: #FAF7F2; --card-bg: #FFFFFF; --text: #2C2416; --muted: #8A7D6B;
  --olive: #6B7C3A; --olive-light: #E8EDDA; --terracotta: #C4704B;
  --red: #C0392B; --gold: #D4A84B; --border: #E5DFD4;
  --font-display: 'Fraunces', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-armenian: 'Noto Sans Armenian', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; min-height: 100dvh; }
.shell { max-width: 520px; margin: 0 auto; padding: 0 16px 40px; padding-top: env(safe-area-inset-top); }
header { text-align: center; padding: 28px 0 12px; }
header h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; }
header p { font-family: var(--font-body); font-size: 13px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; }
.nav { display: flex; gap: 4px; margin-bottom: 20px; background: var(--card-bg); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
.nav button { flex: 1; padding: 10px 0; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
.nav button.active { background: var(--olive); color: #fff; }
.nav button:not(.active) { background: transparent; color: var(--muted); }
.card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.btn { border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; font-family: var(--font-body); cursor: pointer; font-weight: 600; transition: opacity .15s; white-space: nowrap; }
.btn-olive { background: var(--olive); color: #fff; }
.btn-terracotta { background: var(--terracotta); color: #fff; }
.btn-gold { background: var(--gold); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-ghost-olive { background: transparent; border: 1px solid var(--border); color: var(--olive); }
.btn-ghost-red { background: transparent; border: 1px solid var(--border); color: var(--red); }
input, textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--font-body); font-size: 14px; background: var(--card-bg); outline: none; color: var(--text); }
.cat-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: 600; border: none; font-family: var(--font-body); }
.cat-btn.active { background: var(--olive); color: #fff; }
.cat-btn:not(.active) { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.reveal-box { background: var(--olive-light); border-radius: 8px; padding: 16px; margin-bottom: 16px; text-align: center; }
.reveal-box.alpha { padding: 24px; }
.tag { display: inline-block; margin-top: 8px; font-size: 11px; color: var(--terracotta); background: #FDF0E9; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.entry-card { display: flex; justify-content: space-between; align-items: flex-start; }
.entry-actions { display: flex; gap: 4px; margin-left: 8px; flex-shrink: 0; }
.score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.quiz-prompt { font-size: 12px; color: var(--terracotta); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.flex-row { display: flex; gap: 8px; }
.flex-1 { flex: 1; }
.hidden { display: none; }
audio { height: 32px; max-width: 180px; }
details summary { cursor: pointer; font-size: 13px; font-weight: 600; color: var(--terracotta); padding: 8px 0; }
</style>
</head>

// ─── Storage (localStorage) ────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Merge any new seed entries
      const ids = new Set(d.entries.map(e => e.id));
      const added = SEED_DATA.entries.filter(e => !ids.has(e.id));
      if (added.length) {
        d.entries.push(...added);
        d.categories = [...new Set([...d.categories, ...SEED_DATA.categories])];
        localStorage.setItem(DB_KEY, JSON.stringify(d));
      }
      return d;
    }
  } catch(e) {}
  localStorage.setItem(DB_KEY, JSON.stringify(SEED_DATA));
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveData(data) { localStorage.setItem(DB_KEY, JSON.stringify(data)); }
function shuffle(a) { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

let view = 'quiz';
let editId = null;

let quiz = { queue:[], current:null, revealed:false, score:{correct:0,total:0}, filterCat:'All', active:false };

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <header><h1>\u0540\u0561\u0575\u0565\u0580\u0565\u0576</h1><p>ARMENIAN PRACTICE</p></header>
    <div class="nav">
      <button class="${view==='quiz'?'active':''}" onclick="setView('quiz')">Quiz</button>
      <button class="${view==='manage'?'active':''}" onclick="setView('manage')">Library</button>

  `;
  if (view==='quiz') renderQuiz();
  else if (view==='manage') renderManage();
  else if (view==='add'||view==='edit') renderForm();
}

function setView(v) { view=v; editId=null; if(v==='quiz'){quiz.active=false;} render(); }

// ─── Quiz ──────────────────────────────────────────────────────────
function renderQuiz() {
  const el = document.getElementById('content');
  if (!data.entries.length) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:40px"><p style="font-size:32px;margin-bottom:12px">\u{1F4DD}</p><p style="color:var(--muted);font-size:15px;line-height:1.6">No entries yet. Add some phrases to start quizzing!</p></div>`;
    return;
  }
  if (!quiz.active) {
    const cats = ['All', ...new Set(data.entries.map(e=>e.category).filter(Boolean))];
    el.innerHTML = `
      <div class="card" style="text-align:center">
        <p style="font-size:15px;margin-bottom:16px">Choose a category to quiz:</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:20px">
          ${cats.map(c=>`<button class="cat-btn ${c===quiz.filterCat?'active':''}" style="font-size:13px;padding:6px 14px;cursor:pointer" onclick="quiz.filterCat='${esc(c)}';renderQuiz()">${esc(c)}</button>`).join('')}
        </div>
        <button class="btn btn-terracotta" style="width:100%;padding:14px 0;font-size:16px" onclick="startQuiz()">Start Quiz</button>
      </div>
    `;
    return;
  }
  if (!quiz.current) {
    const pct = quiz.score.total ? Math.round(quiz.score.correct/quiz.score.total*100) : 0;
    el.innerHTML = `
      <div class="card" style="text-align:center">
        <p style="font-size:40px;margin-bottom:8px">\u{1F389}</p>
        <p style="font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:8px">Session Complete!</p>
        <p style="font-size:28px;color:var(--olive);font-weight:700">${quiz.score.correct} / ${quiz.score.total}</p>
        <p style="color:var(--muted);font-size:14px;margin:4px 0 24px">${pct}% correct</p>
        <button class="btn btn-olive" style="width:100%;padding:12px 0" onclick="quiz.active=false;quiz.score={correct:0,total:0};renderQuiz()">New Session</button>
      </div>
    `;
    return;
  }
  const c = quiz.current;
  const isAlpha = c.category === 'Alphabet';
  const num = quiz.score.total + 1;
  const total = num + quiz.queue.length;

  let front, revealHTML;
  if (isAlpha) {
    // Alphabet: Armenian letter on front, name + sound on back
    front = `<p style="font-family:var(--font-armenian);font-size:64px;font-weight:700;text-align:center;margin:24px 0;letter-spacing:16px">${esc(c.armenian)}</p>`;
    revealHTML = `
      <div class="reveal-box alpha">
        <p style="font-size:20px;font-weight:700;margin-bottom:6px">${esc(c.english)}</p>
        ${c.pronunciation ? `<p style="font-size:14px;color:var(--muted);font-style:italic">${esc(c.pronunciation)}</p>` : ''}
        ${c.audio ? `<div style="margin-top:10px"><button class="btn btn-olive" style="padding:6px 12px;font-size:13px" onclick="playAudio('${c.id}')">&#9654; Play</button><audio id="aud-${c.id}" src="${c.audio}"></audio></div>` : ''}
      </div>
    `;
  } else {
    // Lesson cards: English on front, pronunciation + Armenian on back
    front = `<p style="font-family:var(--font-body);font-size:22px;font-weight:700;text-align:center;margin:20px 0 8px;line-height:1.4">${esc(c.english)}</p>`;
    revealHTML = `
      <div class="reveal-box">
        ${c.pronunciation ? `<p style="font-size:18px;font-weight:600;margin-bottom:8px">${esc(c.pronunciation)}</p>` : ''}
        ${c.armenian ? `<p style="font-family:var(--font-armenian);font-size:15px;color:var(--muted)">${esc(c.armenian)}</p>` : ''}
        ${c.audio ? `<div style="margin-top:10px"><button class="btn btn-olive" style="padding:6px 12px;font-size:13px" onclick="playAudio('${c.id}')">&#9654; Play</button><audio id="aud-${c.id}" src="${c.audio}"></audio></div>` : ''}
      </div>
    `;
  }

  el.innerHTML = `
    <div class="score-row">
      <span style="font-size:13px;color:var(--muted)">${num} / ${total}</span>
      <span style="font-size:13px;color:var(--olive);font-weight:600">${quiz.score.correct} correct</span>
    </div>
    <div class="card">
      <p class="quiz-prompt">${isAlpha ? 'What is this letter?' : 'How do you say this in Armenian?'}</p>
      ${front}
      ${!quiz.revealed ? `
        <button class="btn btn-gold" style="width:100%;padding:14px 0;font-size:15px;margin-top:12px" onclick="quiz.revealed=true;renderQuiz()">Reveal Answer</button>
      ` : `
        <div style="margin-top:16px">
          ${revealHTML}
          <div class="flex-row">
            <button class="btn btn-red flex-1" onclick="nextCard(false)">Missed it</button>
            <button class="btn btn-olive flex-1" onclick="nextCard(true)">Got it \u2713</button>
          </div>
        </div>
      `}
    </div>
    ${c.category ? `<p style="text-align:center;font-size:12px;color:var(--muted);margin-top:10px">${esc(c.category)}</p>` : ''}
  `;
}

function startQuiz() {
  const pool = quiz.filterCat==='All' ? data.entries : data.entries.filter(e=>e.category===quiz.filterCat);
  if (!pool.length) return;
  const q = shuffle(pool);
  quiz.queue = q.slice(1);
  quiz.current = q[0];
  quiz.revealed = false;
  quiz.score = {correct:0,total:0};
  quiz.active = true;
  renderQuiz();
}
function nextCard(correct) {
  quiz.score.correct += correct?1:0;
  quiz.score.total += 1;
  if (!quiz.queue.length) { quiz.current=null; quiz.active=true; renderQuiz(); return; }
  quiz.current = quiz.queue.shift();
  quiz.revealed = false;
  renderQuiz();
}
function playAudio(id) { const a=document.getElementById('aud-'+id); if(a) a.play(); }

// ─── Library / Manage ──────────────────────────────────────────────

    if (manageSearch) {
      const s = manageSearch.toLowerCase();

    return true;
  });
  const alphaCount = data.entries.filter(e=>e.category==='Alphabet').length;
  const vocabCount = data.entries.filter(e=>e.category!=='Alphabet').length;

  el.innerHTML = `

      ${cats.map(c=>`<button class="cat-btn ${c===manageFilter?'active':''}" onclick="manageFilter='${esc(c)}';renderManage()">${esc(c)}</button>`).join('')}
    </div>
    ${filtered.length===0 ? `<p style="text-align:center;color:var(--muted);padding:20px">${data.entries.length===0?'No entries yet \u2014 add your first one!':'No matches found.'}</p>` : `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${filtered.map(e => `
          <div class="card" style="padding:16px">
            <div class="entry-card">
              <div style="flex:1;min-width:0">
                <p style="font-weight:600;font-size:15px;margin-bottom:4px">${esc(e.english)}</p>
                ${e.armenian ? `<p style="font-family:var(--font-armenian);font-size:16px;font-weight:600;color:var(--olive);margin-bottom:2px">${esc(e.armenian)}</p>` : ''}
                ${e.pronunciation ? `<p style="font-size:13px;color:var(--muted);font-style:italic">${esc(e.pronunciation)}</p>` : ''}
              </div>
              <div class="entry-actions">
                ${e.audio ? `<button class="btn btn-olive" style="padding:6px 12px;font-size:13px" onclick="playAudio('m${e.id}')">&#9654; Play</button><audio id="aud-m${e.id}" src="${e.audio}"></audio>` : ''}
                <button class="btn btn-ghost-olive" style="padding:6px 10px;font-size:12px" onclick="startEdit('${e.id}')">Edit</button>
                <button class="btn btn-ghost-red" style="padding:6px 10px;font-size:12px" onclick="deleteEntry('${e.id}')">&times;</button>

            </div>
            ${e.category ? `<span class="tag">${esc(e.category)}</span>` : ''}
          </div>
        `).join('')}
      </div>
    `}
    <details style="margin-top:24px">
      <summary>\u{1F4D6} Pronunciation Notes</summary>
      <div class="card" style="margin-top:8px;padding:16px;font-size:13px;line-height:1.7">
        <p style="margin-bottom:8px"><strong>kh</strong> = throaty "h" (like clearing your throat gently)</p>
        <p style="margin-bottom:8px"><strong>k</strong> sounds a bit like <strong>g</strong></p>
        <p style="margin-bottom:8px"><strong>\u0565</strong> (ech) = pronounced more like "ay"</p>
        <p style="margin-bottom:8px"><strong>\u0568</strong> (y\u0259) = the "upside down e" = sounds like "uh"</p>

        <p style="color:var(--muted);font-style:italic">Add your own notes here by editing this section after each lesson!</p>
      </div>
    </details>
  `;

      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Armenian Script</label>
        <input id="f-armenian" style="margin-top:6px;font-family:var(--font-armenian)" placeholder="\u0532\u0561\u0580\u0587" value="${esc(formState.armenian)}">
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Pronunciation</label>
        <input id="f-pronunciation" style="margin-top:6px" placeholder="barev" value="${esc(formState.pronunciation)}">
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px">Audio Pronunciation</label>
        <div id="audio-controls" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button class="btn btn-olive" onclick="startRecording()" id="rec-btn"><span style="display:inline-block;width:8px;height:8px;background:#fff;border-radius:50%;margin-right:6px"></span>Record</button>
          ${formState.audio ? `<audio controls src="${formState.audio}" style="height:32px;max-width:180px"></audio><button class="btn btn-ghost-red" style="font-size:12px;padding:2px 6px" onclick="formState.audio=null;renderFormInner()">Remove</button>` : ''}
        </div>
      </div>
      <div class="flex-row">
        <button class="btn btn-ghost flex-1" style="color:var(--muted)" onclick="setView('manage')">Cancel</button>
        <button class="btn btn-olive flex-1" onclick="handleSubmit()">${ex?'Save Changes':'Add Entry'}</button>
      </div>
    `}
  `;
}

function handleSubmit() {
  const english = document.getElementById('f-english')?.value?.trim();
  if (!english) return;
  const entry = {
    id: editId || Date.now().toString(),
    english,
    armenian: document.getElementById('f-armenian')?.value?.trim()||'',
    pronunciation: document.getElementById('f-pronunciation')?.value?.trim()||'',
    category: formState.category || 'Uncategorized',
    audio: formState.audio
  };
  if (editId) { data.entries = data.entries.map(e=>e.id===editId?entry:e); }
  else { data.entries.push(entry); }
  saveData(data); setView('manage');
}

function handleBulkAdd() {
  const text = document.getElementById('bulk-text')?.value||'';
  const lines = text.trim().split('\n').filter(Boolean);
  lines.forEach(line => {
    const parts = line.split('|').map(s=>s.trim());
    if (parts[0]) {
      data.entries.push({
        id: Date.now().toString() + Math.random().toString(36).slice(2,6),
        english: parts[0], armenian: parts[1]||'', pronunciation: parts[2]||'',
        category: formState.category||'Uncategorized', audio: null
      });
    }
  });
  saveData(data); setView('manage');
}

function addNewCat() {
  const v = document.getElementById('new-cat-input')?.value?.trim();
  if (v && !data.categories.includes(v)) {
    data.categories.push(v);
    formState.category = v;
    formState.showNewCat = false;
    saveData(data);
    renderFormInner();
  }
}

// ─── Audio Recording ───────────────────────────────────────────────
function startRecording() {
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    const mr = new MediaRecorder(stream);
    const chunks = [];
    mr.ondataavailable = e => chunks.push(e.data);
    mr.onstop = () => {
      const blob = new Blob(chunks, {type:'audio/webm'});
      const reader = new FileReader();
      reader.onloadend = () => { formState.audio = reader.result; stream.getTracks().forEach(t=>t.stop()); renderFormInner(); };
      reader.readAsDataURL(blob);
    };
    mr.start();
    const btn = document.getElementById('rec-btn');
    if (btn) {
      btn.innerHTML = '<span style="display:inline-block;width:8px;height:8px;background:#fff;border-radius:2px;margin-right:6px"></span>Stop';
      btn.className = 'btn btn-red';
      btn.onclick = () => mr.stop();
    }
  }).catch(() => alert('Microphone access needed to record pronunciation.'));
}

// ─── Init ──────────────────────────────────────────────────────────
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
